version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datalis_backend
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datalis_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
