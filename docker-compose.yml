version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datalis_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
        - VITE_APP_RECAPTCHA_SITE_KEY=${VITE_APP_RECAPTCHA_SITE_KEY}
        - VITE_GROQ_API_KEY=${VITE_GROQ_API_KEY}
        - VITE_TAVILY_API_KEY=${VITE_TAVILY_API_KEY}
    container_name: datalis_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

